<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0a"/>
  
  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="320" cy="90" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="150" cy="130" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="280" cy="180" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="50" cy="250" r="1.3" fill="#ffffff" opacity="0.7"/>
  <circle cx="350" cy="300" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="200" cy="350" r="1.5" fill="#ffffff" opacity="0.8"/>
  
  <!-- Main celestial object (nebula-like) -->
  <defs>
    <radialGradient id="nebula-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <circle cx="200" cy="200" r="80" fill="url(#nebula-grad)"/>
  <circle cx="200" cy="200" r="50" fill="url(#nebula-grad)" opacity="0.6"/>
  
  <!-- Telescope icon in center -->
  <g transform="translate(170, 170)" opacity="0.4">
    <path d="M 10 30 L 40 10 L 45 15 L 15 35 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
    <circle cx="12" cy="32" r="4" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="40" y1="10" x2="35" y2="5" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="35" y1="15" x2="30" y2="10" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" font-family="monospace" font-size="14" fill="#666666">
    no image available
  </text>
</svg>
